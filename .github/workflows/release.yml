name: Build APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure release signing
        if: ${{ env.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p .signing
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > .signing/release.jks
          {
            printf 'release.storeFile=.signing/release.jks\n'
            printf 'release.storePassword=%s\n' "$ANDROID_RELEASE_STORE_PASSWORD"
            printf 'release.keyAlias=%s\n' "$ANDROID_RELEASE_KEY_ALIAS"
            printf 'release.keyPassword=%s\n' "$ANDROID_RELEASE_KEY_PASSWORD"
          } > local.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Collect APKs
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/
          ls -lh release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: 15hours-apks
          path: release/*.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          files: release/*.apk
          generate_release_notes: true
          make_latest: true
